<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>약점 연금술 상점</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&display=swap');

        :root {
            --primary-bg: #1a1a2e;
            --alchemy-purple: #7b2cbf;
            --gem-gold: #ffcf33;
        }

        body {
            font-family: 'Gaegu', cursive;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 가마솥 애니메이션 */
        .cauldron-container {
            position: relative;
            width: 150px;
            height: 150px;
        }

        .cauldron {
            filter: drop-shadow(0 0 15px rgba(123, 44, 191, 0.6));
        }

        .brewing {
            animation: shake 0.5s infinite ease-in-out;
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }

        /* 보석 탄생 애니메이션 */
        .gem-appear {
            animation: float-up 2s ease-out forwards;
        }

        @keyframes float-up {
            0% { transform: translateY(20px) scale(0); opacity: 0; }
            50% { transform: translateY(-30px) scale(1.2); opacity: 1; }
            100% { transform: translateY(-20px) scale(1); opacity: 1; }
        }

        .sparkle {
            position: absolute;
            width: 5px;
            height: 5px;
            background: white;
            border-radius: 50%;
            pointer-events: none;
        }

        .input-area {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .stone-btn:active {
            transform: scale(0.95);
        }

        .history-card {
            cursor: pointer;
            transition: all 0.2s;
        }

        .history-card:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.4);
        }

        /* 모달 및 보조 UI */
        #qrModal, #actionModal {
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(5px);
        }

        #qrcode img {
            margin: 0 auto;
            border: 8px solid white;
            border-radius: 8px;
        }
        
        .action-item {
            background: rgba(255, 255, 255, 0.05);
            border-left: 4px solid #7b2cbf;
        }
    </style>
</head>
<body class="p-4 md:p-8 flex flex-col items-center">

    <!-- 공유 버튼 (우측 상단) -->
    <div class="fixed top-4 right-4 z-50">
        <button onclick="toggleQRModal()" class="bg-white/10 hover:bg-white/20 p-3 rounded-full border border-white/20 shadow-lg transition-all flex items-center gap-2">
            <span class="text-xl">📲</span>
            <span class="font-bold hidden sm:inline">상점 주소</span>
        </button>
    </div>

    <!-- 헤더 영역 -->
    <header class="text-center mb-8">
        <h1 class="text-5xl font-bold text-yellow-400 mb-2 drop-shadow-lg">✨ 약점 연금술 상점 ✨</h1>
        <p class="text-xl text-gray-300">투박한 약점 돌멩이를 빛나는 강점 보석으로 바꿔드려요!</p>
    </header>

    <main class="w-full max-w-4xl grid grid-cols-1 md:grid-cols-2 gap-8 items-center">
        
        <!-- 왼쪽: 약점 투입구 -->
        <section class="input-area rounded-3xl p-6 flex flex-col gap-4 shadow-2xl">
            <div class="flex items-center gap-3 mb-2">
                <span class="text-3xl">🪨</span>
                <h2 class="text-2xl font-bold text-white">약점 돌멩이 넣기</h2>
            </div>
            <textarea id="weaknessInput" 
                      class="w-full h-32 p-4 rounded-xl bg-gray-900 text-white border-2 border-gray-700 focus:border-purple-500 focus:outline-none text-xl resize-none"
                      placeholder="예: 나는 행동이 너무 느려요..."></textarea>
            
            <button onclick="startAlchemy()" 
                    id="alchemyBtn"
                    class="stone-btn w-full py-4 bg-purple-600 hover:bg-purple-500 text-white rounded-xl text-2xl font-bold transition-all shadow-lg flex items-center justify-center gap-2">
                <span>🔥 연금술 시작하기</span>
            </button>
        </section>

        <!-- 오른쪽: 보석 전시관 -->
        <section id="resultArea" class="input-area rounded-3xl p-6 flex flex-col items-center justify-center min-h-[400px] shadow-2xl relative overflow-hidden">
            <div id="placeholderMsg" class="text-center text-gray-400">
                <div class="text-6xl mb-4">🔮</div>
                <p class="text-xl text-white">연금술이 시작되면<br>이곳에서 보석이 탄생해요!</p>
            </div>

            <!-- 결과물 표시 (숨김 상태) -->
            <div id="gemResult" class="hidden flex flex-col items-center text-center w-full">
                <div id="gemIcon" class="text-8xl mb-4 gem-appear cursor-pointer" onclick="showActionGuide()">💎</div>
                <h3 class="text-3xl font-bold text-yellow-300 mb-2" id="strengthTitle">제목</h3>
                <div class="text-sm text-purple-300 mb-4 bg-purple-900/40 px-3 py-1 rounded-full border border-purple-500/30" id="originalWeakness">원래 약점 표시</div>
                <p class="text-xl leading-relaxed text-white bg-black/30 p-4 rounded-xl shadow-inner mb-6 w-full" id="strengthDesc">
                    설명 내용
                </p>
                <!-- 행동 지침 확인 버튼 -->
                <button onclick="showActionGuide()" class="bg-yellow-500 hover:bg-yellow-400 text-black px-6 py-2 rounded-full font-bold shadow-lg transition-transform active:scale-95 flex items-center gap-2">
                    <span>💡</span> 성장 비결 확인하기
                </button>
            </div>

            <!-- 가마솥 애니메이션 -->
            <div id="alchemyLoading" class="hidden flex flex-col items-center">
                <div class="cauldron-container brewing">
                    <svg class="cauldron w-full h-full" viewBox="0 0 200 200">
                        <path fill="#4B3F72" d="M30 80c0-10 10-20 20-20h100c10 0 20 10 20 20v60c0 20-20 40-40 40H70c-20 0-40-20-40-40V80z"/>
                        <rect x="20" y="70" width="160" height="15" rx="7" fill="#1F1A38"/>
                        <circle cx="60" cy="180" r="15" fill="#1F1A38"/>
                        <circle cx="140" cy="180" r="15" fill="#1F1A38"/>
                        <path fill="#7B2CBF" d="M40 75s10-15 60-15 60 15 60 15v5H40v-5z">
                            <animate attributeName="d" dur="1s" repeatCount="indefinite" values="M40 75s10-15 60-15 60 15 60 15v5H40v-5z;M40 75s10-5 60-5 60 5 60 5v5H40v-5z;M40 75s10-15 60-15 60 15 60 15v5H40v-5z" />
                        </path>
                    </svg>
                </div>
                <p class="mt-4 text-purple-300 font-bold animate-pulse text-2xl">신비로운 힘으로 변환 중...</p>
            </div>
        </section>
    </main>

    <!-- 하단: 발견한 보석 수집함 -->
    <footer class="w-full max-w-4xl mt-12 bg-black/40 p-6 rounded-3xl border border-white/10">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-2xl font-bold flex items-center gap-2 text-white">
                <span>📦</span> 나의 보석 가방 (최근 10개)
            </h2>
            <button onclick="clearAllHistory()" class="text-sm text-gray-500 hover:text-red-400 underline transition-colors">기록 초기화</button>
        </div>
        <div id="gemHistory" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>
    </footer>

    <!-- 성장 비결(행동 지침) 모달 -->
    <div id="actionModal" class="fixed inset-0 z-[110] hidden flex items-center justify-center p-4">
        <div class="bg-gray-900 border-2 border-yellow-500 p-6 md:p-8 rounded-3xl max-w-lg w-full relative shadow-[0_0_50px_rgba(234,179,8,0.3)]">
            <button onclick="closeActionModal()" class="absolute top-4 right-4 text-gray-400 hover:text-white text-2xl">✕</button>
            <div class="text-center mb-6">
                <span id="modalGemIcon" class="text-6xl block mb-2">💎</span>
                <h2 class="text-2xl font-bold text-yellow-400" id="modalTitle">보석 이름</h2>
                <p class="text-gray-400 mt-1">이 강점을 더 빛나게 만드는 3가지 방법</p>
            </div>
            
            <div id="actionList" class="flex flex-col gap-3 mb-6 text-left">
                <!-- 행동 지침 리스트가 여기에 담깁니다 -->
            </div>
            
            <button onclick="closeActionModal()" class="w-full py-4 bg-yellow-600 hover:bg-yellow-500 text-black font-bold rounded-xl text-xl transition-all">
                확인했습니다!
            </button>
        </div>
    </div>

    <!-- QR 코드 모달 -->
    <div id="qrModal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-gray-900 border-2 border-purple-500 p-8 rounded-3xl max-w-sm w-full text-center relative">
            <button onclick="toggleQRModal()" class="absolute top-4 right-4 text-gray-400 hover:text-white text-2xl">✕</button>
            <h2 class="text-2xl font-bold text-yellow-400 mb-4">상점 공유 QR 코드</h2>
            <div id="qrcode" class="mb-6 flex justify-center"></div>
            <p class="text-gray-300 mb-4">친구들이나 선생님께<br>이 QR 코드를 보여주세요!</p>
            <button onclick="toggleQRModal()" class="w-full py-3 bg-purple-600 rounded-xl font-bold">닫기</button>
        </div>
    </div>

    <script>
        const apiKey = ""; // 시스템에 의해 자동 주입됨
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'weakness-alchemy';
        const gemIcons = ["💎", "💍", "✨", "🔮", "💠", "🌟", "🌈", "🔥", "🪐", "🦄"];
        
        let currentStrengthData = null; // 현재 화면에 표시된 데이터 임시 저장

        window.onload = () => {
            renderHistory();
            generateQRCode();
        }

        function generateQRCode() {
            const qrContainer = document.getElementById("qrcode");
            qrContainer.innerHTML = "";
            const currentUrl = window.location.href;
            new QRCode(qrContainer, {
                text: currentUrl,
                width: 200, height: 200,
                colorDark : "#000000", colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });
        }

        function toggleQRModal() {
            const modal = document.getElementById('qrModal');
            modal.classList.toggle('hidden');
        }

        async function startAlchemy() {
            const input = document.getElementById('weaknessInput');
            const weakness = input.value.trim();

            if (!weakness) {
                alert("약점 돌멩이를 먼저 넣어주세요!");
                return;
            }

            document.getElementById('placeholderMsg').classList.add('hidden');
            document.getElementById('gemResult').classList.add('hidden');
            document.getElementById('alchemyLoading').classList.remove('hidden');
            document.getElementById('alchemyBtn').disabled = true;

            try {
                const strengthData = await transformWeakness(weakness);
                const randomIcon = gemIcons[Math.floor(Math.random() * gemIcons.length)];
                
                currentStrengthData = { ...strengthData, icon: randomIcon, weakness: weakness };
                
                showResult(strengthData, randomIcon, weakness);
                saveToHistory(weakness, strengthData, randomIcon);
                
                input.value = "";
            } catch (error) {
                console.error(error);
                alert("연금술 가마솥에 문제가 생겼어요. 다시 시도해주세요!");
                resetUI();
            }
        }

        async function transformWeakness(weakness) {
            const systemPrompt = `
                너는 초등학교 아이들의 약점을 강점으로 바꿔주는 '마음 연금술사'야. 
                아이가 입력한 약점 문장을 받으면:
                1. 긍정적인 퍼스널 브랜딩 문구로 바꾼다.
                2. 이 약점을 보완하고 강점을 키울 수 있는 아주 구체적이고 쉬운 행동 지침(Action Items) 3가지를 제안한다.
                
                형식은 반드시 JSON으로만 답변해: 
                {
                  "title": "짧은 강점 별명", 
                  "description": "격려하는 따뜻한 한 문장",
                  "actions": ["실천 행동 1", "실천 행동 2", "실천 행동 3"]
                }
                
                예: "행동이 느리다" -> {
                    "title": "신중한 완벽주의자", 
                    "description": "무엇이든 꼼꼼하게 살피고 실수 없이 해내는 멋진 능력이 있어요!", 
                    "actions": ["중요한 일은 미리 계획표 짜보기", "시간을 확인하며 한 단계씩 해결하기", "꼼꼼함이 필요한 역할 맡아보기"]
                }
                아이들의 눈높이에서 이해하기 쉽고 재미있게 작성해줘.
            `;

            const userQuery = `약점: "${weakness}"`;
            let retries = 5;
            let delay = 1000;

            while (retries > 0) {
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: userQuery }] }],
                            systemInstruction: { parts: [{ text: systemPrompt }] },
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    });
                    const result = await response.json();
                    return JSON.parse(result.candidates[0].content.parts[0].text);
                } catch (e) {
                    retries--;
                    if (retries === 0) throw e;
                    await new Promise(res => setTimeout(res, delay));
                    delay *= 2;
                }
            }
        }

        function showResult(data, icon, originalWeakness) {
            document.getElementById('alchemyLoading').classList.add('hidden');
            document.getElementById('placeholderMsg').classList.add('hidden');
            
            const gemResult = document.getElementById('gemResult');
            const gemIcon = document.getElementById('gemIcon');
            
            gemResult.classList.remove('hidden');
            gemIcon.innerText = icon;
            document.getElementById('strengthTitle').innerText = data.title;
            document.getElementById('originalWeakness').innerText = `원래 돌멩이: ${originalWeakness}`;
            document.getElementById('strengthDesc').innerText = data.description;

            createSparkles();
            document.getElementById('alchemyBtn').disabled = false;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // 행동 지침 모달 열기
        function showActionGuide() {
            if (!currentStrengthData) return;
            
            document.getElementById('modalGemIcon').innerText = currentStrengthData.icon;
            document.getElementById('modalTitle').innerText = currentStrengthData.title;
            
            const listContainer = document.getElementById('actionList');
            const actions = currentStrengthData.actions || ["더 나은 내가 되기 위해 노력하기", "나의 장점을 믿기", "매일 조금씩 성장하기"];
            
            listContainer.innerHTML = actions.map((act, i) => `
                <div class="action-item p-4 rounded-xl flex gap-3 items-center animate-fade-in" style="animation-delay: ${i * 0.1}s">
                    <div class="bg-yellow-500 text-black font-bold w-6 h-6 rounded-full flex items-center justify-center shrink-0">${i+1}</div>
                    <p class="text-white text-lg">${act}</p>
                </div>
            `).join('');
            
            document.getElementById('actionModal').classList.remove('hidden');
        }

        function closeActionModal() {
            document.getElementById('actionModal').classList.add('hidden');
        }

        function saveToHistory(weakness, strengthData, icon) {
            let history = JSON.parse(localStorage.getItem('alchemyHistory') || '[]');
            const newGem = {
                id: Date.now().toString(),
                weakness,
                title: strengthData.title,
                desc: strengthData.description,
                actions: strengthData.actions,
                icon: icon
            };
            history.unshift(newGem);
            history = history.slice(0, 10);
            localStorage.setItem('alchemyHistory', JSON.stringify(history));
            renderHistory();
        }

        function renderHistory() {
            const container = document.getElementById('gemHistory');
            const history = JSON.parse(localStorage.getItem('alchemyHistory') || '[]');
            
            if (history.length === 0) {
                container.innerHTML = `<p class="text-gray-500 col-span-full text-center py-8 border-2 border-dashed border-gray-800 rounded-2xl">아직 보석이 없어요.</p>`;
                return;
            }

            container.innerHTML = history.map(item => `
                <div class="history-card bg-white/5 border border-white/20 p-4 rounded-2xl flex items-center gap-3" 
                     onclick="loadGemFromHistory('${item.id}')">
                    <span class="text-3xl">${item.icon}</span>
                    <div class="flex-1 overflow-hidden">
                        <div class="font-bold text-yellow-400 truncate">${item.title}</div>
                        <div class="text-xs text-gray-500 truncate">돌: ${item.weakness}</div>
                    </div>
                </div>
            `).join('');
        }

        function loadGemFromHistory(id) {
            const history = JSON.parse(localStorage.getItem('alchemyHistory') || '[]');
            const selectedGem = history.find(gem => gem.id === id);
            
            if (selectedGem) {
                currentStrengthData = {
                    title: selectedGem.title,
                    description: selectedGem.desc,
                    actions: selectedGem.actions,
                    icon: selectedGem.icon,
                    weakness: selectedGem.weakness
                };
                showResult(currentStrengthData, selectedGem.icon, selectedGem.weakness);
            }
        }

        function clearAllHistory() {
            if(confirm("보석 가방을 비우시겠습니까?")) {
                localStorage.removeItem('alchemyHistory');
                renderHistory();
                resetUI();
            }
        }

        function resetUI() {
            document.getElementById('alchemyLoading').classList.add('hidden');
            document.getElementById('gemResult').classList.add('hidden');
            document.getElementById('placeholderMsg').classList.remove('hidden');
            document.getElementById('alchemyBtn').disabled = false;
            currentStrengthData = null;
        }

        function createSparkles() {
            const container = document.getElementById('resultArea');
            for(let i=0; i<20; i++) {
                const sparkle = document.createElement('div');
                sparkle.className = 'sparkle';
                sparkle.style.left = Math.random() * 100 + '%';
                sparkle.style.top = Math.random() * 100 + '%';
                sparkle.style.animation = `float-up ${1 + Math.random()}s ease-out`;
                container.appendChild(sparkle);
                setTimeout(() => sparkle.remove(), 1500);
            }
        }
    </script>
</body>
</html>
